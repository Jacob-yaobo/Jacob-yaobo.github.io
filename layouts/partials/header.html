<header class="site-header">
  <nav class="nav-container">
    <a href="{{ "/" | relURL }}" class="nav-logo" aria-label="{{ .Site.Params.lab_name }}">
      <img src="{{ "images/branding/logo-m.png" | relURL }}" alt="" class="nav-logo-wordmark">
    </a>
    <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
        {{ $isResearchActive := and (eq .Name "Research") (eq $.Section "research") }}
        {{ $isActive := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) $isResearchActive }}
        <a href="{{ .URL }}" class="nav-link{{ if $isActive }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
</header>
