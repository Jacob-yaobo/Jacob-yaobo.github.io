<header class="site-header">
  <nav class="nav-container">
    <a href="{{ "/" | relURL }}" class="nav-logo">
      <span class="logo-icon">◈</span>
      <span>{{ .Site.Params.lab_name }}</span>
    </a>
    <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
</header>
