{{ define "main" }}
<section class="section page-section">
  <div class="container container-narrow">
    <article>
      {{ if .Date }}<time class="post-date">{{ .Date.Format "Jan 2, 2006" }}</time>{{ end }}
      <h1 class="page-title">{{ .Title }}</h1>
      {{ if .Params.tags }}
      <div class="tags">
        {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
      {{ end }}
      <div class="content">
        {{ .Content }}
      </div>
    </article>
  </div>
</section>
{{ end }}
